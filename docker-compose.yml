name: orbit

services:
  postgres:
    image: postgres:17-alpine
    container_name: orbit-postgres
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: IssueTracker
    ports:
      - "${DB_PORT:-5432}:5432"
    volumes:
      - orbit-db:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d IssueTracker"]
      interval: 3s
      timeout: 5s
      retries: 15
      start_period: 5s

volumes:
  orbit-db:
